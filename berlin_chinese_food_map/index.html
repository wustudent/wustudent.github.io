<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Berlin Chinese Food Map</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<link rel="stylesheet"
href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>

<link rel="stylesheet"
href="style.css"/>

<link rel="apple-touch-icon" sizes="180x180" href="../favicon_imgs/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="../favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="../favicon-16x16.png">
<link rel="manifest" href="../site.webmanifest">
</head>

<body>

<div style="display: flex; align-items: center;">
<div class="header">
    <img src="../favicon-32x32.png" alt="Icon"/>
    <h1>Berlin Chinese Food Map</h1>
</div>
<a href="https://chopmap.vercel.app/en" id="coupon-link"><img id="coupon-img" src="coupon.svg" alt="Coupon"/></a>
</div>

<div id="container">

    <div id="sidebar" style="display: none;">
        <input id="search" placeholder="Search restaurant" />

        <select id="filter">
            <option value="">All cuisines</option>
        </select>

        <div id="list"></div>
    </div>

    <div id="map"></div>
    <button id="locate-btn" title="Show my location" aria-label="Show my location">📍</button>
</div>

<!-- 添加过滤器设置框和按钮 -->
<div id="filter-container">
  <button id="toggle-filter">
    <img src="filter.svg" alt="filter" style="width: 20pt; height: 20pt;">
  </button>
  <div id="filters" class="hidden">
    <label for="district-filter">区域/Quarter:</label>
    <select id="district-filter">
      <option value="all">所有/All</option>
    </select>

    <label for="category-filter">类别/Category:</label>
    <select id="category-filter">
      <option value="all">所有/All</option>
    </select>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>

<script src="script.js"></script>

</body>
</html>
