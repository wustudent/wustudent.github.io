<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>Berlin Chinese Food Map</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<link rel="stylesheet"
href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>

<link rel="stylesheet"
href="style.css"/>

<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="manifest" href="/site.webmanifest">
</head>

<body>

<div class="header">
    <img src="favicon-32x32.png" alt="Icon"/>
    <h1>Berlin Chinese Food Map</h1>
</div>

<div id="container">

    <div id="sidebar" style="display: none;">
        <input id="search" placeholder="Search restaurant" />

        <select id="filter">
            <option value="">All cuisines</option>
        </select>

        <div id="list"></div>
    </div>

    <div id="map"></div>
    <button id="locate-btn" title="Show my location" aria-label="Show my location">📍</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.2/papaparse.min.js"></script>

<script src="script.js"></script>

</body>
</html>
